name: Security Scan and Smoke Tests

on:
  push:
  pull_request:

jobs:
  security-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install project with dev dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run secret scanner smoke test
        run: python -m pytest -q tests/test_security_scan.py
      - name: Run repository safety grep
        run: python scripts/safety_grep.py
