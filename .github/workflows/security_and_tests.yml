name: Security Scan and Smoke Tests

on:
  push:
  pull_request:

jobs:
  security-and-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install pytest
        run: python -m pip install --upgrade pytest
      - name: Run secret scanner (quick)
        run: |
          python - <<'PY'
          from security.secret_scanner import scan_for_secrets
          findings = scan_for_secrets('.')
          if findings:
            print(f"FOUND {len(findings)} potential secret(s)")
            for f in findings[:5]:
              print(f"{f[0]}:{f[1]}: {f[2]}")
            raise SystemExit(1)
          print("No obvious secrets found.")
          PY
      - name: Run security smoke tests
        run: pytest -q tests/test_security_scan.py
