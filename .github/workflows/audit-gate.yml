name: Audit Gate

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run audit validator
        run: python scripts/audit_validator.py

      - name: V2 CLI audit
        env:
          PYTHONPATH: src
        run: python -m sonic_xrpl.cli.main audit

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-validator-report
          path: artifacts/audit_validator_report.json
