services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - deploy/paper-runtime.env
    environment:
      PYTHONPATH: /opt/sonic/src
      EXECUTION_ENABLED: "false"
      LIVE_TRADING_ENABLED: "false"
    entrypoint:
      [
        "python",
        "-m",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/data
    restart: unless-stopped

  paper-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - deploy/paper-runtime.env
    environment:
      PYTHONPATH: /opt/sonic/src
      SONIC_RUNTIME_MODE: "paper"
      SONIC_DRY_RUN: "true"
      EXECUTION_ENABLED: "false"
      LIVE_TRADING_ENABLED: "false"
      SONIC_STORAGE_PATH: /data/v2.db
    entrypoint: ["sleep"]
    command: ["infinity"]
    volumes:
      - sqlite_data:/data
      - ./docs:/opt/sonic/docs
    healthcheck:
      test: ["CMD", "python", "-m", "sonic_xrpl.cli.main", "health", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      paper-runtime:
        condition: service_healthy
    environment:
      SONIC_RUNTIME_MODE: "paper"
      EXECUTION_ENABLED: "false"
      LIVE_TRADING_ENABLED: "false"
    entrypoint:
      [
        "python",
        "-m",
        "streamlit",
        "run",
        "dashboard/streamlit_app.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
      ]
    ports:
      - "8501:8501"
    volumes:
      - sqlite_data:/data
      - ./reports:/opt/sonic/reports:ro
      - ./artifacts:/opt/sonic/artifacts:ro
      - ./docs:/opt/sonic/docs:ro
    restart: unless-stopped

volumes:
  sqlite_data:
