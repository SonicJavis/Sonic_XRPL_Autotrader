services:
  paper-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - deploy/paper-runtime.env
    environment:
      SONIC_RUNTIME_MODE: "paper"
      SONIC_DRY_RUN: "true"
      EXECUTION_ENABLED: "false"
      LIVE_TRADING_ENABLED: "false"
      SONIC_STORAGE_PATH: /data/v2.db
    command: ["health", "--json"]
    volumes:
      - sqlite_data:/data
      - ./docs:/opt/sonic/docs
    healthcheck:
      test: ["CMD", "python", "-m", "sonic_xrpl.cli.main", "health", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  sqlite_data:
